name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Install Capacitor Platforms & Generate Assets
        run: |
          npm install @capacitor/android @capacitor/assets @capacitor/local-notifications
          npx cap add android
          npx @capacitor/assets generate --android

      - name: Configure App Signature
        run: node scripts/sign-setup.cjs

      - name: Sync Web Assets to Android
        run: npx cap sync

      - name: Build Android APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
